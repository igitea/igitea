name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/igitea-${{ github.ref_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/igitea-${{ github.ref_name }}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/

  build-ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build ios --release --no-codesign

      - run: |
          mkdir -p artifacts
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../artifacts/igitea-${{ github.ref_name }}.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: artifacts/

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build macos --release

      - name: Package DMG
        run: |
          brew install create-dmg
          mkdir -p artifacts
          create-dmg \
            --volname "iGitea" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --app-drop-link 450 150 \
            artifacts/igitea-${{ github.ref_name }}.dmg \
            build/macos/Build/Products/Release/Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: artifacts/

  build-linux:
    strategy:
      matrix:
        arch:
          - name: x64
            runner: ubuntu-latest
            appimage_tool: https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          - name: arm64
            runner: ubuntu-24.04-arm
            appimage_tool: https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage
    name: Linux (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - run: flutter build linux --release

      - name: Package AppImage
        run: |
          sudo apt-get install -y file
          mkdir -p artifacts/AppDir/usr/bin
          cp -r build/linux/*/release/bundle/* artifacts/AppDir/usr/bin/
          cat > artifacts/AppDir/igitea.desktop << 'EOF'
          [Desktop Entry]
          Name=iGitea
          Exec=igitea
          Type=Application
          Categories=Development;
          Terminal=false
          EOF
          ln -s usr/bin/igitea artifacts/AppDir/AppRun
          wget -q ${{ matrix.arch.appimage_tool }} -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          /tmp/appimagetool artifacts/AppDir artifacts/igitea-${{ github.ref_name }}-linux-${{ matrix.arch.name }}.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch.name }}
          path: artifacts/

  build-windows:
    strategy:
      matrix:
        arch:
          - name: x64
            runner: windows-latest
          - name: arm64
            runner: windows-11-arm
    name: Windows (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          $buildDir = Get-ChildItem -Path "build\windows" -Directory | Select-Object -First 1 -ExpandProperty Name
          if (-not $buildDir) { throw "No Windows build output found" }
          Compress-Archive -Path "build\windows\$buildDir\runner\Release\*" -DestinationPath "artifacts\igitea-${{ github.ref_name }}-windows-${{ matrix.arch.name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch.name }}
          path: artifacts/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
      - build-macos
      - build-linux
      - build-windows

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: iGitea ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            artifacts/android/*
            artifacts/ios/*
            artifacts/macos/*
            artifacts/linux-x64/*
            artifacts/linux-arm64/*
            artifacts/windows-x64/*
            artifacts/windows-arm64/*
          generate_release_notes: false
