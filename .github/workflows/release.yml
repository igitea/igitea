name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/igitea-${{ github.ref_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/igitea-${{ github.ref_name }}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/

  build-ios:
    name: iOS IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p artifacts
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r artifacts/igitea-${{ github.ref_name }}.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: artifacts/

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package DMG
        run: |
          brew install create-dmg
          mkdir -p artifacts
          create-dmg \
            --volname "iGitea" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --app-drop-link 450 150 \
            artifacts/igitea-${{ github.ref_name }}.dmg \
            build/macos/Build/Products/Release/Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: artifacts/

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev file wget

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package AppImage
        run: |
          mkdir -p artifacts/AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* artifacts/AppDir/usr/bin/

          cat > artifacts/AppDir/igitea.desktop << 'EOF'
          [Desktop Entry]
          Name=iGitea
          Exec=igitea
          Type=Application
          Icon=igitea
          Categories=Development;
          EOF
          
          cp assets/icon.png artifacts/AppDir/igitea.png || touch artifacts/AppDir/igitea.png
          
          ln -s usr/bin/igitea artifacts/AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool artifacts/AppDir artifacts/igitea-${{ github.ref_name }}-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: artifacts/

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "artifacts\igitea-${{ github.ref_name }}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-macos, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            merged-artifacts/**/*.apk
            merged-artifacts/**/*.aab
            merged-artifacts/**/*.ipa
            merged-artifacts/**/*.dmg
            merged-artifacts/**/*.AppImage
            merged-artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
