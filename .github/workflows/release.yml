name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/igitea-${{ github.ref_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/igitea-${{ github.ref_name }}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/

  build-ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build ios --release --no-codesign

      - run: |
          mkdir -p artifacts
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../artifacts/igitea-${{ github.ref_name }}.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: artifacts/

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build macos --release

      - name: Package DMG
        run: |
          brew install create-dmg
          mkdir -p artifacts
          create-dmg \
            --volname "iGitea" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --app-drop-link 450 150 \
            artifacts/igitea-${{ github.ref_name }}.dmg \
            build/macos/Build/Products/Release/Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: artifacts/

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - run: flutter build linux --release

      - name: Package AppImage
        run: |
          sudo apt-get install -y file
          mkdir -p artifacts/AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* artifacts/AppDir/usr/bin/
          cat > artifacts/AppDir/igitea.desktop << 'EOF'
          [Desktop Entry]
          Name=iGitea
          Exec=igitea
          Type=Application
          Categories=Development;
          Terminal=false
          EOF
          ln -s usr/bin/igitea artifacts/AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          /tmp/appimagetool artifacts/AppDir artifacts/igitea-${{ github.ref_name }}-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: artifacts/

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v4
        with:
          flutter-version: stable

      - run: flutter build windows --release

      - name: Package ZIP
        run: |
          mkdir artifacts
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath artifacts\igitea-${{ github.ref_name }}-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
      - build-macos
      - build-linux
      - build-windows

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: iGitea ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            artifacts/android/*
            artifacts/ios/*
            artifacts/macos/*
            artifacts/linux/*
            artifacts/windows/*
          generate_release_notes: false
